<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Manager</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    min-height: 100vh;
    background: #0B1220 url(background.png) top center / cover no-repeat;
    color: #F8FAFC;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 60px 20px 40px;
    box-sizing: border-box;
  }
  img.logo { width: 110px; height: 110px; margin-bottom: 20px; }
  h1 { font-size: 1.9em; font-weight: 800; letter-spacing: 1.5px; color: #3DA8FF; margin: 0 0 18px; }
  .tagline { font-size: 1.1em; opacity: 0.9; max-width: 420px; margin-bottom: 2.5em; }
  p.desc { max-width: 480px; color: #94A3B8; line-height: 1.55; }
  .apps { margin-top: 2em; }
  .apps a {
    display: inline-block;
    margin: 8px;
    padding: 10px 22px;
    border: 1px solid #1E2D45;
    border-radius: 999px;
    color: #F8FAFC;
    text-decoration: none;
    font-weight: 600;
  }
  .apps a:hover { border-color: #3DA8FF; color: #3DA8FF; }
  .links { margin-top: 2.5em; }
  .links a { color: #3DA8FF; text-decoration: none; font-weight: 600; }
  .links a:hover { text-decoration: underline; }
  .footer { margin-top: auto; padding-top: 3em; color: #475569; font-size: 0.8em; }
</style>
</head>
<body>
<img class="logo" src="shield.png" alt="Sports Manager">
<h1>SPORTS MANAGER</h1>
<p class="tagline">Off the spreadsheet. Into the app.</p>
<p class="desc">A family of simple companion apps for running leagues and
pools with friends, family or the office.</p>
<div class="apps">
  <a href="/lsm/">Last Stand Manager</a>
</div>
<p class="links"><a href="mailto:sportsmanager@zohomail.eu">Support</a></p>
<p class="footer">&copy; Sports Manager</p>
</body>
</html>
